<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grab Income Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00b14f;
    --green-light: #e6f7ee;
    --green-dark: #007a37;
    --bg: #f5f7f5;
    --card: #ffffff;
    --text: #1a2e1a;
    --text-2: #4a6741;
    --text-3: #8aaa82;
    --border: #d4e8d0;
    --red: #e53935;
    --red-light: #fdecea;
    --yellow: #f59e0b;
    --shadow: 0 2px 12px rgba(0,177,79,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--green);
    color: #fff;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,177,79,0.3);
    position: sticky; top: 0; z-index: 100;
  }
  header .logo { font-size: 26px; }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header p { font-size: 12px; opacity: 0.85; }

  /* TABS */
  .tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); padding: 0 16px; gap: 4px; overflow-x: auto; }
  .tab { padding: 12px 20px; font-size: 14px; font-weight: 500; color: var(--text-2); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: all .2s; }
  .tab:hover { color: var(--green); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 700; }

  /* MAIN CONTENT */
  .content { padding: 20px 16px; max-width: 900px; margin: 0 auto; }

  /* CARDS ROW */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .card .label { font-size: 11px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .card .value { font-size: 22px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--text); }
  .card .value.green { color: var(--green-dark); }
  .card .value.red { color: var(--red); }
  .card .sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .card.highlight { background: var(--green); border-color: var(--green-dark); }
  .card.highlight .label, .card.highlight .value, .card.highlight .sub { color: #fff; }

  /* FORM */
  .form-card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 24px; }
  .form-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
  .form-group input {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 14px; font-family: 'Sarabun', sans-serif;
    background: var(--bg); color: var(--text); transition: border-color .2s;
    outline: none;
  }
  .form-group input:focus { border-color: var(--green); background: #fff; }
  .form-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn { padding: 11px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; font-family: 'Sarabun', sans-serif; cursor: pointer; border: none; transition: all .2s; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,177,79,0.3); }
  .btn-secondary { background: var(--bg); color: var(--text-2); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--green); color: var(--green); }

  /* TABLE */
  .table-card { background: var(--card); border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .table-header h3 { font-size: 15px; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f9fbf9; padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); }
  td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid #f0f5ef; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9fbf9; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .profit-pos { color: var(--green-dark); font-weight: 600; }
  .profit-neg { color: var(--red); font-weight: 600; }
  td .del-btn { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 6px; transition: all .2s; }
  td .del-btn:hover { color: var(--red); background: var(--red-light); }

  /* SUMMARY TAB */
  .month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .month-card {
    background: var(--card); border-radius: 14px; padding: 16px;
    box-shadow: var(--shadow); border: 1px solid var(--border); cursor: pointer;
    transition: all .2s;
  }
  .month-card:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,177,79,0.12); }
  .month-card.selected { border-color: var(--green); background: var(--green-light); }
  .month-card.no-data { opacity: 0.45; }
  .month-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .month-income { font-size: 20px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--green-dark); }
  .month-detail { font-size: 11px; color: var(--text-3); margin-top: 4px; }

  /* MONTH DETAIL */
  .detail-section { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 20px; }
  .detail-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
  .detail-item { text-align: center; padding: 12px; background: var(--bg); border-radius: 12px; }
  .detail-item .d-label { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
  .detail-item .d-val { font-size: 18px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--text); }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: var(--green-light); color: var(--green-dark); }
  .badge-gray { background: #f0f0f0; color: #888; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-3); }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--green); color: #fff; padding: 12px 24px; border-radius: 30px;
    font-size: 14px; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: transform .3s; z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    th, td { padding: 8px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🚗</div>
  <div>
    <h1>Grab Income Tracker</h1>
    <p>บันทึกรายได้ & วิเคราะห์ข้อมูล 2026</p>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">📝 บันทึกข้อมูล</div>
  <div class="tab" onclick="switchTab('summary')">📊 สรุปรายเดือน</div>
</div>

<!-- INPUT TAB -->
<div id="tab-input" class="content">
  <!-- Summary Cards -->
  <div class="cards" id="overview-cards"></div>

  <!-- Form -->
  <div class="form-card">
    <div class="form-title">➕ เพิ่มข้อมูลใหม่</div>
    <div class="form-grid">
      <div class="form-group">
        <label>วันที่</label>
        <input type="date" id="inp-date">
      </div>
      <div class="form-group">
        <label>รายได้ (บาท)</label>
        <input type="number" id="inp-income" placeholder="0" step="0.01">
      </div>
      <div class="form-group">
        <label>ระยะทาง (กม.)</label>
        <input type="number" id="inp-dist" placeholder="0" step="0.01">
      </div>
      <div class="form-group">
        <label>กม./ลิตร</label>
        <input type="number" id="inp-kpl" placeholder="21" step="0.1" value="21">
      </div>
      <div class="form-group">
        <label>บาท/ลิตร</label>
        <input type="number" id="inp-ppl" placeholder="29" step="0.01" value="29">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="addRecord()">💾 บันทึก</button>
      <button class="btn btn-secondary" onclick="clearForm()">🗑 ล้าง</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <h3>📋 รายการทั้งหมด</h3>
      <select id="filter-month" onchange="renderTable()" style="padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Sarabun',sans-serif;font-size:13px;background:var(--bg);color:var(--text);outline:none;">
        <option value="all">ทุกเดือน</option>
      </select>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>วันที่</th>
            <th>รายได้</th>
            <th>ระยะทาง</th>
            <th>กม./ล.</th>
            <th>บาท/ล.</th>
            <th>ค่าน้ำมัน</th>
            <th>กำไร</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="records-body"></tbody>
      </table>
    </div>
    <div id="empty-table" class="empty-state" style="display:none;">
      <div class="emoji">📭</div>
      <p>ยังไม่มีข้อมูล กรุณาเพิ่มข้อมูลด้านบน</p>
    </div>
  </div>
</div>

<!-- SUMMARY TAB -->
<div id="tab-summary" class="content" style="display:none;">
  <div id="year-cards" class="cards" style="margin-bottom:24px;"></div>

  <div class="month-grid" id="month-grid"></div>

  <div id="month-detail-section" style="display:none;">
    <div class="detail-section">
      <h3 id="detail-title">สรุปเดือน</h3>
      <div class="detail-grid" id="detail-grid"></div>
    </div>
    <div class="table-card">
      <div class="table-header"><h3>รายละเอียดรายวัน</h3></div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr><th>วันที่</th><th>รายได้</th><th>ระยะทาง</th><th>ค่าน้ำมัน</th><th>กำไร</th></tr>
          </thead>
          <tbody id="detail-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const MONTHS_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let records = JSON.parse(localStorage.getItem('grab_records') || '[]');

function save() { localStorage.setItem('grab_records', JSON.stringify(records)); }

function fmt(n) { return Number(n).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtInt(n) { return Number(n).toLocaleString('th-TH'); }

function calcOil(dist, kpl, ppl) {
  if (!dist || !kpl) return 0;
  return (dist / kpl) * ppl;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(tab) {
  document.getElementById('tab-input').style.display = tab === 'input' ? '' : 'none';
  document.getElementById('tab-summary').style.display = tab === 'summary' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'input') || (i === 1 && tab === 'summary'));
  });
  if (tab === 'summary') renderSummary();
}

function addRecord() {
  const date = document.getElementById('inp-date').value;
  const income = parseFloat(document.getElementById('inp-income').value) || 0;
  const dist = parseFloat(document.getElementById('inp-dist').value) || 0;
  const kpl = parseFloat(document.getElementById('inp-kpl').value) || 21;
  const ppl = parseFloat(document.getElementById('inp-ppl').value) || 29;

  if (!date) { showToast('⚠️ กรุณาเลือกวันที่'); return; }
  if (!income) { showToast('⚠️ กรุณากรอกรายได้'); return; }

  const oil = calcOil(dist, kpl, ppl);
  records.push({ date, income, dist, kpl, ppl, oil, profit: income - oil });
  records.sort((a, b) => a.date.localeCompare(b.date));
  save();
  renderAll();
  clearForm();
  showToast('✅ บันทึกข้อมูลเรียบร้อย');
}

function deleteRecord(idx) {
  if (!confirm('ลบรายการนี้?')) return;
  records.splice(idx, 1);
  save();
  renderAll();
  showToast('🗑 ลบข้อมูลแล้ว');
}

function clearForm() {
  document.getElementById('inp-date').value = '';
  document.getElementById('inp-income').value = '';
  document.getElementById('inp-dist').value = '';
  document.getElementById('inp-kpl').value = '21';
  document.getElementById('inp-ppl').value = '29';
}

function renderOverviewCards() {
  const totalIncome = records.reduce((s, r) => s + r.income, 0);
  const totalOil = records.reduce((s, r) => s + r.oil, 0);
  const totalProfit = records.reduce((s, r) => s + r.profit, 0);
  const workDays = records.filter(r => r.income > 0).length;
  const avgDay = workDays ? totalIncome / workDays : 0;

  document.getElementById('overview-cards').innerHTML = `
    <div class="card highlight">
      <div class="label">รายได้รวม</div>
      <div class="value">฿${fmtInt(Math.round(totalIncome))}</div>
      <div class="sub">${workDays} วันทำงาน</div>
    </div>
    <div class="card">
      <div class="label">ค่าน้ำมัน</div>
      <div class="value red">฿${fmtInt(Math.round(totalOil))}</div>
      <div class="sub">รวมทั้งหมด</div>
    </div>
    <div class="card">
      <div class="label">กำไรสุทธิ</div>
      <div class="value green">฿${fmtInt(Math.round(totalProfit))}</div>
      <div class="sub">หลังหักน้ำมัน</div>
    </div>
    <div class="card">
      <div class="label">เฉลี่ย/วัน</div>
      <div class="value">฿${fmtInt(Math.round(avgDay))}</div>
      <div class="sub">รายได้ก่อนหักน้ำมัน</div>
    </div>
  `;
}

function renderTable() {
  const filterMonth = document.getElementById('filter-month').value;
  let filtered = records;
  if (filterMonth !== 'all') filtered = records.filter(r => r.date.startsWith(filterMonth));

  const tbody = document.getElementById('records-body');
  document.getElementById('empty-table').style.display = filtered.length ? 'none' : '';

  // Update filter dropdown
  const months = [...new Set(records.map(r => r.date.slice(0, 7)))].sort();
  const sel = document.getElementById('filter-month');
  const cur = sel.value;
  sel.innerHTML = '<option value="all">ทุกเดือน</option>' + months.map(m => {
    const [y, mo] = m.split('-');
    return `<option value="${m}" ${m===cur?'selected':''}>${MONTHS[parseInt(mo)-1]} ${parseInt(y)+543}</option>`;
  }).join('');

  tbody.innerHTML = filtered.map((r, i) => {
    const realIdx = records.indexOf(r);
    const d = new Date(r.date);
    const dateStr = `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()+543}`;
    return `<tr>
      <td>${dateStr}</td>
      <td class="mono">฿${fmt(r.income)}</td>
      <td class="mono">${fmt(r.dist)}</td>
      <td class="mono">${r.kpl}</td>
      <td class="mono">${r.ppl}</td>
      <td class="mono" style="color:var(--red);">฿${fmt(r.oil)}</td>
      <td class="mono ${r.profit >= 0 ? 'profit-pos' : 'profit-neg'}">฿${fmt(r.profit)}</td>
      <td><button class="del-btn" onclick="deleteRecord(${realIdx})">✕</button></td>
    </tr>`;
  }).join('');
}

function renderSummary() {
  // Year totals
  const totalIncome = records.reduce((s, r) => s + r.income, 0);
  const totalOil = records.reduce((s, r) => s + r.oil, 0);
  const totalProfit = records.reduce((s, r) => s + r.profit, 0);
  const totalDist = records.reduce((s, r) => s + r.dist, 0);
  document.getElementById('year-cards').innerHTML = `
    <div class="card highlight">
      <div class="label">รายได้รวมทั้งปี</div>
      <div class="value">฿${fmtInt(Math.round(totalIncome))}</div>
    </div>
    <div class="card">
      <div class="label">ค่าน้ำมันรวม</div>
      <div class="value red">฿${fmtInt(Math.round(totalOil))}</div>
    </div>
    <div class="card">
      <div class="label">กำไรสุทธิ</div>
      <div class="value green">฿${fmtInt(Math.round(totalProfit))}</div>
    </div>
    <div class="card">
      <div class="label">ระยะทางรวม</div>
      <div class="value">${fmtInt(Math.round(totalDist))}</div>
      <div class="sub">กิโลเมตร</div>
    </div>
  `;

  // Month cards
  const grid = document.getElementById('month-grid');
  grid.innerHTML = MONTHS.map((m, idx) => {
    const mo = String(idx + 1).padStart(2, '0');
    const key = `2026-${mo}`;
    const recs = records.filter(r => r.date.startsWith(key));
    const inc = recs.reduce((s, r) => s + r.income, 0);
    const oil = recs.reduce((s, r) => s + r.oil, 0);
    const days = recs.filter(r => r.income > 0).length;
    const hasData = recs.length > 0;
    return `<div class="month-card ${!hasData ? 'no-data' : ''}" onclick="showMonthDetail('${key}', '${m}')">
      <div class="month-name">${MONTHS_EN[idx]} · ${m}</div>
      <div class="month-income">${hasData ? '฿' + fmtInt(Math.round(inc)) : '—'}</div>
      <div class="month-detail">${hasData ? `${days} วัน · น้ำมัน ฿${fmtInt(Math.round(oil))}` : 'ยังไม่มีข้อมูล'}</div>
      ${hasData ? '<div style="margin-top:8px;"><span class="badge badge-green">มีข้อมูล</span></div>' : '<div style="margin-top:8px;"><span class="badge badge-gray">รอข้อมูล</span></div>'}
    </div>`;
  }).join('');
}

function showMonthDetail(key, monthName) {
  const recs = records.filter(r => r.date.startsWith(key));
  if (!recs.length) { showToast('ยังไม่มีข้อมูลเดือนนี้'); return; }

  document.querySelectorAll('.month-card').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');

  const inc = recs.reduce((s, r) => s + r.income, 0);
  const oil = recs.reduce((s, r) => s + r.oil, 0);
  const profit = recs.reduce((s, r) => s + r.profit, 0);
  const dist = recs.reduce((s, r) => s + r.dist, 0);
  const days = recs.filter(r => r.income > 0).length;
  const avgDay = days ? inc / days : 0;

  const [y, mo] = key.split('-');
  document.getElementById('detail-title').textContent = `สรุปเดือน ${monthName} ${parseInt(y)+543}`;
  document.getElementById('detail-grid').innerHTML = `
    <div class="detail-item"><div class="d-label">รายได้รวม</div><div class="d-val" style="color:var(--green-dark);">฿${fmtInt(Math.round(inc))}</div></div>
    <div class="detail-item"><div class="d-label">ค่าน้ำมัน</div><div class="d-val" style="color:var(--red);">฿${fmtInt(Math.round(oil))}</div></div>
    <div class="detail-item"><div class="d-label">กำไรสุทธิ</div><div class="d-val" style="color:var(--green-dark);">฿${fmtInt(Math.round(profit))}</div></div>
    <div class="detail-item"><div class="d-label">วันทำงาน</div><div class="d-val">${days} วัน</div></div>
    <div class="detail-item"><div class="d-label">ระยะทาง</div><div class="d-val">${fmtInt(Math.round(dist))} กม.</div></div>
    <div class="detail-item"><div class="d-label">เฉลี่ย/วัน</div><div class="d-val">฿${fmtInt(Math.round(avgDay))}</div></div>
  `;

  document.getElementById('detail-body').innerHTML = recs.map(r => {
    const d = new Date(r.date);
    const dateStr = `${d.getDate()} ${MONTHS[d.getMonth()]}`;
    return `<tr>
      <td>${dateStr}</td>
      <td class="mono">฿${fmt(r.income)}</td>
      <td class="mono">${fmt(r.dist)} กม.</td>
      <td class="mono" style="color:var(--red);">฿${fmt(r.oil)}</td>
      <td class="mono ${r.profit >= 0 ? 'profit-pos' : 'profit-neg'}">฿${fmt(r.profit)}</td>
    </tr>`;
  }).join('');

  document.getElementById('month-detail-section').style.display = '';
  document.getElementById('month-detail-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderAll() {
  renderOverviewCards();
  renderTable();
}

// Set today's date as default
document.getElementById('inp-date').value = new Date().toISOString().slice(0, 10);

renderAll();
</script>
</body>
</html>
