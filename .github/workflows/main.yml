
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
  * { box-sizing: border-box; }
  :root {
    --px: 3px;
    --c-blue: #4488ff;
    --c-red: #ff4455;
    --c-green: #44ff88;
    --c-yellow: #ffdd44;
    --c-purple: #cc44ff;
    --c-dark: #0a0a1a;
    --c-panel: #111128;
    --c-border: #334;
  }
  .arena {
    background: var(--c-dark);
    padding: 0;
    font-family: 'Press Start 2P', monospace;
    color: #dde;
    position: relative;
    overflow: hidden;
    min-height: 680px;
    image-rendering: pixelated;
  }
  .header {
    background: var(--c-panel);
    border-bottom: 2px solid var(--c-border);
    padding: 12px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .title { font-size: 8px; color: var(--c-yellow); letter-spacing: 1px; }
  .round-badge { font-size: 7px; color: #888; }
  .battlefield {
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    gap: 0;
    padding: 0;
  }
  .agent-panel {
    background: var(--c-panel);
    border-right: 1px solid var(--c-border);
    padding: 12px;
    position: relative;
  }
  .agent-panel.right { border-right: none; border-left: 1px solid var(--c-border); }
  .agent-name {
    font-size: 7px;
    letter-spacing: 1px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--c-border);
  }
  .name-blue { color: var(--c-blue); }
  .name-red { color: var(--c-red); }
  .hp-bar-wrap { margin-bottom: 8px; }
  .hp-label { font-size: 5px; color: #888; margin-bottom: 3px; }
  .hp-bar {
    height: 8px;
    background: #222;
    border: 1px solid #445;
    position: relative;
    image-rendering: pixelated;
  }
  .hp-fill {
    height: 100%;
    transition: width 0.4s steps(20);
    position: relative;
  }
  .hp-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.25);
  }
  .hp-fill-blue { background: var(--c-blue); }
  .hp-fill-red { background: var(--c-red); }
  .xp-bar-wrap { margin-bottom: 10px; }
  .xp-fill { background: var(--c-yellow); }
  .pixel-sprite {
    width: 100%;
    display: flex;
    justify-content: center;
    margin: 10px 0;
  }
  canvas { image-rendering: pixelated; }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-bottom: 8px;
  }
  .stat-box {
    background: #0d0d20;
    border: 1px solid #334;
    padding: 4px 6px;
  }
  .stat-label { font-size: 4px; color: #667; margin-bottom: 2px; }
  .stat-val { font-size: 7px; }
  .blue { color: var(--c-blue); }
  .red { color: var(--c-red); }
  .green { color: var(--c-green); }
  .yellow { color: var(--c-yellow); }
  .purple { color: var(--c-purple); }
  .skills-list { margin-top: 6px; }
  .skill-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    cursor: pointer;
    padding: 3px 4px;
    border: 1px solid transparent;
    transition: border-color 0.1s;
  }
  .skill-row:hover { border-color: #445; background: #0d0d20; }
  .skill-icon {
    width: 14px; height: 14px;
    border: 1px solid #445;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
    flex-shrink: 0;
  }
  .skill-name { font-size: 5px; color: #aac; flex: 1; }
  .skill-power { font-size: 5px; }
  .vs-col {
    background: var(--c-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .vs-text {
    font-family: 'Press Start 2P';
    font-size: 9px;
    color: var(--c-yellow);
    writing-mode: vertical-rl;
    text-orientation: mixed;
    letter-spacing: 4px;
  }
  .battle-log {
    background: #080812;
    border-top: 2px solid var(--c-border);
    padding: 10px 14px;
    min-height: 110px;
    max-height: 140px;
    overflow-y: auto;
    position: relative;
  }
  .log-line {
    font-size: 5px;
    color: #88aacc;
    margin-bottom: 3px;
    padding: 2px 0;
    border-bottom: 1px solid #111;
    line-height: 1.6;
    animation: fadein 0.3s ease;
  }
  @keyframes fadein { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; } }
  .log-line.dmg { color: var(--c-red); }
  .log-line.heal { color: var(--c-green); }
  .log-line.system { color: var(--c-yellow); }
  .log-line.crit { color: var(--c-purple); }
  .controls {
    background: var(--c-panel);
    border-top: 1px solid var(--c-border);
    padding: 8px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    padding: 6px 10px;
    border: 2px solid;
    background: transparent;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.1s steps(2);
    color: inherit;
  }
  .btn:active { transform: translate(1px,1px); }
  .btn-blue { border-color: var(--c-blue); color: var(--c-blue); }
  .btn-blue:hover { background: var(--c-blue); color: #000; }
  .btn-red { border-color: var(--c-red); color: var(--c-red); }
  .btn-red:hover { background: var(--c-red); color: #000; }
  .btn-yellow { border-color: var(--c-yellow); color: var(--c-yellow); }
  .btn-yellow:hover { background: var(--c-yellow); color: #000; }
  .btn-green { border-color: var(--c-green); color: var(--c-green); }
  .btn-green:hover { background: var(--c-green); color: #000; }
  .auto-badge {
    font-size: 5px;
    padding: 3px 7px;
    border: 1px solid #445;
    color: #667;
    margin-left: auto;
  }
  .auto-badge.on { border-color: var(--c-green); color: var(--c-green); }
  .effect-flash {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.05s;
  }
  .flash-active { opacity: 0.15 !important; }
</style>

