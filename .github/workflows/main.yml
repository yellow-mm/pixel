
<h2 class="sr-only">Case priority analysis dashboard for 8 active support cases</h2>
<style>
  .case-row { display: grid; grid-template-columns: 28px minmax(0,1fr) 90px 110px 80px; gap: 0; align-items: stretch; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .case-row:last-child { border-bottom: none; }
  .cell { padding: 10px 12px; font-size: 13px; color: var(--color-text-primary); display: flex; align-items: center; }
  .cell-num { color: var(--color-text-tertiary); font-size: 12px; justify-content: center; padding-left: 8px; }
  .cell-info { flex-direction: column; align-items: flex-start; gap: 2px; }
  .case-title { font-weight: 500; font-size: 13px; line-height: 1.3; }
  .case-customer { font-size: 11px; color: var(--color-text-secondary); }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: var(--border-radius-md); white-space: nowrap; }
  .badge-critical { background: #FCEBEB; color: #791F1F; }
  .badge-high { background: #FAEEDA; color: #633806; }
  .badge-medium { background: #E6F1FB; color: #0C447C; }
  .badge-low { background: #EAF3DE; color: #27500A; }
  .status-pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); white-space: nowrap; }
  .score-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .score-bar-bg { flex: 1; height: 4px; background: var(--color-background-secondary); border-radius: 2px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 2px; }
  .score-num { font-size: 11px; color: var(--color-text-secondary); min-width: 20px; text-align: right; }
  .table-header { display: grid; grid-template-columns: 28px minmax(0,1fr) 90px 110px 80px; border-bottom: 0.5px solid var(--color-border-primary); margin-bottom: 0; }
  .th { padding: 8px 12px; font-size: 11px; color: var(--color-text-secondary); font-weight: 500; }
  .th-center { text-align: center; }
  .reason-tag { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .metric-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
  .metric-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 500; }
  .section-label { font-size: 11px; color: var(--color-text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px; padding: 0; }
  .card-outer { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  @media (prefers-color-scheme: dark) {
    .badge-critical { background: #501313; color: #F7C1C1; }
    .badge-high { background: #412402; color: #FAC775; }
    .badge-medium { background: #042C53; color: #B5D4F4; }
    .badge-low { background: #173404; color: #C0DD97; }
  }
</style>

